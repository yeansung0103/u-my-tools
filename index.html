<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTYLE Toast Manager</title>
<style>
:root{color-scheme:light;--bg:#f6f7f9;--panel:#fff;--panel-2:#f1f3f5;--line:#d7dde5;--text:#1e2329;--muted:#667085;--focus:#2563eb;--selected:#e8f1ff;--selected-strong:#9fc5ff}
*{box-sizing:border-box}
body{font-family:Arial,sans-serif;margin:0;background:var(--bg);color:var(--text)}
header{padding:16px;background:#fff;border-bottom:1px solid var(--line)}
header h2{margin:0;font-size:22px;letter-spacing:0}
.container{display:grid;grid-template-columns:minmax(320px,420px) minmax(0,1fr);height:calc(100vh - 57px);min-height:0}
.left{border-right:1px solid var(--line);padding:12px;overflow:auto;min-width:0}
.right{display:flex;flex-direction:column;gap:12px;padding:12px;overflow:hidden;min-width:0}
input,textarea,button{font:inherit;background:#fff;color:var(--text);border:1px solid #cbd5e1;border-radius:6px}
input,textarea{width:100%;padding:8px}
input[type="file"]{padding:7px;color:var(--muted)}
button{padding:8px 10px;cursor:pointer;white-space:nowrap}
button:hover{background:#f1f5f9;border-color:#94a3b8}
button:focus-visible,input:focus-visible,textarea:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
table{width:100%;border-collapse:collapse;font-size:12px}
td,th{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:top}
th{color:#475569;font-weight:700;background:#f8fafc}
tbody tr:hover{background:#f1f5f9}
.file-panel{display:grid;gap:8px;margin-bottom:10px}
.file-status{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.file-message{min-height:16px;color:var(--muted);font-size:12px;line-height:1.35}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;font-size:11px;border:1px solid #cbd5e1;background:#fff;color:#475569}
.chip.loaded{border-color:#86efac;background:#dcfce7;color:#166534}
.chip.missing{border-color:#fde68a;background:#fef3c7;color:#92400e}
#search{margin-bottom:10px}
.sidebar-table th:first-child{width:72%}
.sidebar-table tbody tr{cursor:pointer}
.sidebar-table .key-cell{max-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar-table tr.selected td{background:var(--selected);border-bottom-color:var(--selected-strong)}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:48px;padding:2px 6px;border-radius:999px;font-size:11px}
.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.err{background:#fee2e2;color:#991b1b}
.right-toolbar{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;padding-bottom:2px}
.right-toolbar h3{margin:0 0 5px;font-size:17px;line-height:1.35;word-break:break-all}
.right-toolbar p{margin:0;color:var(--muted);font-size:12px;line-height:1.4}
.download-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.translation-wrap{flex:1;min-height:0;overflow:auto;border:1px solid var(--line);border-radius:8px;background:var(--panel)}
.translation-table{min-width:960px;table-layout:fixed}
.translation-table th{position:sticky;top:0;z-index:3}
.translation-table th:first-child,.translation-table td.key-col{position:sticky;left:0;z-index:2;background:#fff;box-shadow:1px 0 0 var(--line);width:260px}
.translation-table th:first-child{z-index:4;background:#f8fafc}
.translation-table td{background:var(--panel)}
.translation-table tbody tr{cursor:pointer}
.translation-table tr:hover td{background:#f1f5f9}
.translation-table tr.selected td{background:var(--selected);border-bottom-color:var(--selected-strong)}
.translation-table tr.selected td.key-col{background:var(--selected)}
.translation-table .key-text{font-family:Consolas,Menlo,monospace;line-height:1.35;word-break:break-all;color:#1f2937}
.translation-preview{min-height:18px;white-space:pre-wrap;word-break:break-word;line-height:1.35;color:#1f2937;cursor:text}
.translation-preview.empty{color:#b45309}
.cell-editor{display:block;min-height:44px;overflow:hidden;resize:vertical;line-height:1.4;background:#fff;border-color:#cbd5e1;color:var(--text)}
.translation-table tr.selected .cell-editor{background:#f8fbff;border-color:#60a5fa}
.cell-editor.empty{border-color:#f59e0b;background:#fffbeb}
.empty-row{text-align:center;color:var(--muted);padding:26px}
@media (max-width:900px){.container{grid-template-columns:1fr;height:auto;min-height:calc(100vh - 57px)}.left{border-right:0;border-bottom:1px solid var(--line);max-height:42vh}.right{min-height:58vh}.translation-table{min-width:820px}}
</style>
</head>
<body>
<header><h2>VTYLE Toast Manager</h2></header>

<div class="container">
<aside class="left">
<div class="file-panel">
<input type="file" id="jsonFiles" accept=".json,application/json" multiple>
<div class="file-status" id="fileStatus">
<span class="chip missing" data-lang="ko">ko.json</span>
<span class="chip missing" data-lang="ja">ja.json</span>
<span class="chip missing" data-lang="en">en.json</span>
</div>
<div class="file-message" id="fileMessage">ko.json, ja.json, en.json 파일을 선택하세요.</div>
</div>
<input id="search" placeholder="키 또는 번역 텍스트 검색...">
<table class="sidebar-table">
<thead><tr><th>Key</th><th>Status</th></tr></thead>
<tbody id="rows"></tbody>
</table>
</aside>

<main class="right">
<div class="right-toolbar">
<div>
<h3 id="currentKey">키를 선택하세요</h3>
<p id="placeholder">파일을 선택하면 전체 번역 목록이 표시됩니다.</p>
</div>
<div class="download-actions">
<button type="button" onclick="downloadLang('ko')">Download KO</button>
<button type="button" onclick="downloadLang('ja')">Download JA</button>
<button type="button" onclick="downloadLang('en')">Download EN</button>
</div>
</div>

<div class="translation-wrap">
<table class="translation-table">
<thead><tr><th>Key</th><th>KO</th><th>JA</th><th>EN</th></tr></thead>
<tbody id="translations"></tbody>
</table>
</div>
</main>
</div>

<script>
let koJson={},jaJson={},enJson={};
let flat={};
let currentKey="";
let activeEditor=null;
const loadedFiles={ko:false,ja:false,en:false};
const LANGS=["ko","ja","en"];

function flatten(obj,prefix="",out={}){
 for(const k in obj){
   const key=prefix?prefix+"."+k:k;
   if(obj[k] && typeof obj[k]==="object" && !Array.isArray(obj[k])) flatten(obj[k],key,out);
   else out[key]=obj[k];
 }
 return out;
}

function unflatten(flatData){
 const result={};
 for(const path in flatData){
   const parts=path.split(".");
   let cur=result;
   while(parts.length>1){
     const p=parts.shift();
     cur[p]=cur[p]||{};
     cur=cur[p];
   }
   cur[parts[0]]=flatData[path];
 }
 return result;
}

function textValue(value){
 return value==null?"":String(value);
}

function langFromFilename(name){
 const filename=name.trim().toLowerCase();
 if(filename==="ko.json") return "ko";
 if(filename==="ja.json") return "ja";
 if(filename==="en.json") return "en";
 return "";
}

async function loadFiles(input){
 const files=[...input.files];
 if(!files.length) return;
 const loaded=[];
 const ignored=[];
 const failed=[];

 for(const file of files){
   const lang=langFromFilename(file.name);
   if(!lang){
     ignored.push(file.name);
     continue;
   }

   try{
     const text=await file.text();
     const json=JSON.parse(text);
     if(lang==="ko") koJson=json;
     if(lang==="ja") jaJson=json;
     if(lang==="en") enJson=json;
     loadedFiles[lang]=true;
     loaded.push(file.name);
   }catch(err){
     failed.push(file.name);
   }
 }

 build();
 renderFileStatus({loaded,ignored,failed});
}

function renderFileStatus({loaded=[],ignored=[],failed=[]}={}){
 LANGS.forEach(lang=>{
   const chip=document.querySelector(`.chip[data-lang="${lang}"]`);
   chip.classList.toggle("loaded",loadedFiles[lang]);
   chip.classList.toggle("missing",!loadedFiles[lang]);
 });

 const messages=[];
 if(loaded.length) messages.push("불러옴: "+loaded.join(", "));
 if(ignored.length) messages.push("무시됨: "+ignored.join(", "));
 if(failed.length) messages.push("오류: "+failed.join(", "));
 document.getElementById("fileMessage").innerText=messages.length?messages.join(" | "):"ko.json, ja.json, en.json 파일을 선택하세요.";
}

function build(){
 const previousKey=currentKey;
 const ko=flatten(koJson);
 const ja=flatten(jaJson);
 const en=flatten(enJson);
 const keys=new Set([...Object.keys(ko),...Object.keys(ja),...Object.keys(en)]);

 flat={};
 keys.forEach(k=>{
   flat[k]={ko:textValue(ko[k]),ja:textValue(ja[k]),en:textValue(en[k])};
 });

 currentKey=previousKey && flat[previousKey]?previousKey:"";
 render();
 if(currentKey) selectKey(currentKey,{scroll:false});
 else updateCurrentMeta();
}

function status(item){
 if(!item.ko || !item.ja || !item.en) return "Missing";
 return "OK";
}

function visibleKeys(){
 const q=document.getElementById("search").value.trim().toLowerCase();
 return Object.keys(flat)
   .sort((a,b)=>a.localeCompare(b))
   .filter(k=>{
     if(!q) return true;
     const item=flat[k];
     return [k,item.ko,item.ja,item.en].some(value=>textValue(value).toLowerCase().includes(q));
   });
}

function render(){
 closeActiveEditor();
 const keys=visibleKeys();
 renderSidebar(keys);
 renderTranslations(keys);
 updateSelectionState();
}

function renderSidebar(keys){
 const tbody=document.getElementById("rows");
 tbody.innerHTML="";

 if(!keys.length){
   const tr=document.createElement("tr");
   const td=document.createElement("td");
   td.colSpan=2;
   td.className="empty-row";
   td.innerText=Object.keys(flat).length?"검색 결과 없음":"불러온 번역이 없습니다";
   tr.appendChild(td);
   tbody.appendChild(tr);
   return;
 }

 keys.forEach(k=>{
   const item=flat[k];
   const tr=document.createElement("tr");
   tr.dataset.key=k;
   tr.addEventListener("click",()=>selectKey(k,{scroll:true}));

   const keyCell=document.createElement("td");
   keyCell.className="key-cell";
   keyCell.title=k;
   keyCell.innerText=k;

   const statusCell=document.createElement("td");
   const badge=document.createElement("span");
   badge.className="badge";
   statusCell.appendChild(badge);

   tr.appendChild(keyCell);
   tr.appendChild(statusCell);
   tbody.appendChild(tr);
   updateStatusBadge(tr,item);
 });
}

function renderTranslations(keys){
 const tbody=document.getElementById("translations");
 tbody.innerHTML="";

 if(!keys.length){
   const tr=document.createElement("tr");
   const td=document.createElement("td");
   td.colSpan=4;
   td.className="empty-row";
   td.innerText=Object.keys(flat).length?"검색 결과 없음":"ko.json, ja.json, en.json 파일을 선택하세요";
   tr.appendChild(td);
   tbody.appendChild(tr);
   return;
 }

 keys.forEach(k=>{
   const tr=document.createElement("tr");
   tr.dataset.key=k;
   tr.addEventListener("click",event=>{
     selectKey(k,{scroll:false,scrollSidebar:true});
   });

   const keyCell=document.createElement("td");
   keyCell.className="key-col";
   const keyText=document.createElement("div");
   keyText.className="key-text";
   keyText.innerText=k;
   keyCell.appendChild(keyText);
   tr.appendChild(keyCell);

   LANGS.forEach(lang=>tr.appendChild(createPreviewCell(k,lang)));
   tbody.appendChild(tr);
 });

 updateSelectionState();
}

function createPreviewCell(key,lang){
 const td=document.createElement("td");
 td.dataset.lang=lang;
 td.addEventListener("click",event=>{
   event.stopPropagation();
   selectKey(key,{scroll:false,scrollSidebar:true});
   openEditor(td,key,lang);
 });
 renderPreviewCell(td,key,lang);
 return td;
}

function renderPreviewCell(td,key,lang){
 td.innerHTML="";
 const preview=document.createElement("div");
 const value=flat[key][lang]||"";
 preview.className="translation-preview";
 preview.classList.toggle("empty",!value);
 preview.innerText=value || "Missing";
 preview.title=value;
 td.appendChild(preview);
}

function openEditor(td,key,lang){
 if(activeEditor && activeEditor.td===td && activeEditor.key===key && activeEditor.lang===lang) return;
 closeActiveEditor();

 td.innerHTML="";
 const textarea=document.createElement("textarea");
 textarea.className="cell-editor";
 textarea.value=flat[key][lang]||"";
 textarea.rows=1;
 textarea.spellcheck=false;
 textarea.classList.toggle("empty",!textarea.value);

 activeEditor={td,key,lang,textarea};
 textarea.addEventListener("input",()=>{
   flat[key][lang]=textarea.value;
   textarea.classList.toggle("empty",!textarea.value);
   autosize(textarea);
   syncStatus(key);
   if(currentKey===key) updateCurrentMeta(key);
 });
 textarea.addEventListener("keydown",event=>{
   if(event.key==="Escape"){
     event.preventDefault();
     textarea.blur();
   }
 });
 textarea.addEventListener("blur",()=>{
   setTimeout(()=>{
     if(activeEditor && activeEditor.textarea===textarea) closeActiveEditor();
   },0);
 });

 td.appendChild(textarea);
 requestAnimationFrame(()=>{
   autosize(textarea);
   textarea.focus();
   const end=textarea.value.length;
   textarea.setSelectionRange(end,end);
 });
}

function closeActiveEditor(){
 if(!activeEditor) return;
 const {td,key,lang}=activeEditor;
 activeEditor=null;
 if(td && td.isConnected) renderPreviewCell(td,key,lang);
}

function autosize(textarea){
 textarea.style.height="auto";
 textarea.style.height=Math.max(44,textarea.scrollHeight)+"px";
}

function updateStatusBadge(row,item){
 const st=status(item);
 const badge=row.querySelector(".badge");
 if(!badge) return;
 badge.innerText=st;
 badge.className="badge "+(st==="OK"?"ok":"warn");
}

function rowsForKey(key){
 return [...document.querySelectorAll("tr[data-key]")].filter(row=>row.dataset.key===key);
}

function syncStatus(key){
 rowsForKey(key).forEach(row=>{
   if(row.closest("#rows")) updateStatusBadge(row,flat[key]);
 });
}

function selectKey(key,{scroll=true,scrollSidebar=false}={}){
 if(!flat[key]) return;
 currentKey=key;
 updateCurrentMeta(key);
 updateSelectionState();
 if(scroll) scrollTranslationIntoView(key);
 if(scrollSidebar) scrollSidebarIntoView(key);
}

function updateSelectionState(){
 document.querySelectorAll("tr.selected").forEach(row=>row.classList.remove("selected"));
 if(!currentKey) return;
 rowsForKey(currentKey).forEach(row=>row.classList.add("selected"));
}

function scrollTranslationIntoView(key){
 const row=[...document.querySelectorAll("#translations tr[data-key]")].find(item=>item.dataset.key===key);
 if(row) row.scrollIntoView({behavior:"smooth",block:"center"});
}

function scrollSidebarIntoView(key){
 const row=[...document.querySelectorAll("#rows tr[data-key]")].find(item=>item.dataset.key===key);
 if(row) row.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function updateCurrentMeta(key=currentKey){
 const title=document.getElementById("currentKey");
 const meta=document.getElementById("placeholder");
 if(!key || !flat[key]){
   title.innerText="키를 선택하세요";
   meta.innerText=Object.keys(flat).length?"왼쪽 목록 또는 오른쪽 표에서 키를 선택하세요.":"파일을 선택하면 전체 번역 목록이 표시됩니다.";
   return;
 }

 title.innerText=key;
 const placeholders=new Set();
 LANGS.forEach(lang=>{
   for(const match of textValue(flat[key][lang]).matchAll(/\{\{(.*?)\}\}/g)) placeholders.add(match[1]);
 });
 meta.innerText=placeholders.size?"Placeholders: "+[...placeholders].join(", "):"No placeholders";
}

function downloadLang(lang){
 const langFlat={};
 Object.keys(flat).forEach(k=>langFlat[k]=flat[k][lang]||"");
 const obj=unflatten(langFlat);
 const blob=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=lang+".json";
 a.click();
 URL.revokeObjectURL(a.href);
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("jsonFiles").addEventListener("change",event=>loadFiles(event.target));
renderFileStatus();
render();

// 페이지를 닫거나 새로고침할 때 경고창 표시
window.addEventListener('beforeunload', function (e) {
  e.preventDefault();
  e.returnValue = ''; // 최신 브라우저에서는 이 설정이 필요합니다.
});
</script>
</body>
</html>
