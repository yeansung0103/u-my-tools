<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Filter Playground</title>

<style>
body {
    margin: 0;
    padding: 24px;
    font-family: sans-serif;
    background: #111;
    color: #fff;
}

.dropzone {
    border: 2px dashed #666;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
}

.dropzone:hover {
    border-color: #aaa;
}

.controls {
    margin-bottom: 24px;
}

textarea {
    width: 100%;
    height: 280px;
    box-sizing: border-box;
    padding: 16px;
    background: #1b1b1b;
    color: #fff;
    border: 1px solid #444;
    border-radius: 8px;
    font-family: monospace;
    font-size: 13px;
}

button {
    margin-top: 12px;
    padding: 10px 18px;
    cursor: pointer;
}

.container {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
}

.panel {
    flex: 1;
    min-width: 400px;
}

.preview {
    position: relative;
    display: inline-block;
    max-width: 100%;
}

.preview img {
    display: block;
    max-width: 100%;
    height: auto;
}
</style>

<style id="dynamic-style">
.filter {
    position: relative;
    filter: contrast(103%) brightness(106%) saturate(99%);
}

.filter::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    mix-blend-mode: soft-light;
    opacity: 0.5;
    background: linear-gradient(
        to bottom,
        rgba(0,91,154,1),
        rgba(61,193,230,0)
    );
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="dropzone" id="dropzone">
    이미지를 드래그하거나 클릭해서 업로드
</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<div class="controls">
    <h3>CSS 입력</h3>

<textarea id="cssInput">
.filter {
    position: relative;
    filter: contrast(103%) brightness(106%) saturate(99%);
}

.filter::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    mix-blend-mode: soft-light;
    opacity: 0.5;
    background: linear-gradient(
        to bottom,
        rgba(0,91,154,1),
        rgba(61,193,230,0)
    );
}
</textarea>

    <button id="applyBtn">적용하기</button>
    <button id="copyBtn">클립보드 복사</button>
</div>

<div class="container">

    <div class="panel">
        <h2>원본</h2>
        <div class="preview">
            <img id="original">
        </div>
    </div>

    <div class="panel">
        <h2>필터 적용</h2>
        <div class="preview filter"
        id="captureTarget">
            <img id="filtered">
        </div>
    </div>

</button>

</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const original = document.getElementById('original');
const filtered = document.getElementById('filtered');

const cssInput = document.getElementById('cssInput');
const dynamicStyle = document.getElementById('dynamic-style');

dropzone.addEventListener('click', () => {
    fileInput.click();
});

fileInput.addEventListener('change', (e) => {
    loadImage(e.target.files[0]);
});

dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
});

dropzone.addEventListener('drop', (e) => {
    e.preventDefault();
    loadImage(e.dataTransfer.files[0]);
});

function loadImage(file) {
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        original.src = event.target.result;
        filtered.src = event.target.result;
    };

    reader.readAsDataURL(file);
}

document.getElementById('applyBtn').addEventListener('click', () => {
    dynamicStyle.textContent = cssInput.value;
});

document
.getElementById("copyBtn")
.addEventListener("click", async () => {

    const target =
        document.getElementById("captureTarget");

    const canvas =
        await html2canvas(target, {
            scale: 2,
            backgroundColor: null
        });

    canvas.toBlob(async (blob) => {

        await navigator.clipboard.write([
            new ClipboardItem({
                "image/png": blob
            })
        ]);

        alert("복사 완료");
    });
});

</script>

</body>
</html>
